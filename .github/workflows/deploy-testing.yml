name: Deploy Testing

on:
  push:
    branches: [testing]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_PORT: ${{ secrets.SSH_PORT || '65002' }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_mysql, intl, gd, zip, bcmath, imagick

      - name: Composer Install
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: NPM Build
        run: |
          npm cache clean --force
          rm -rf public/build node_modules
          npm ci
          npm run build

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          chmod 700 ~/.ssh
          ssh-keyscan -p $SSH_PORT -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null

      - name: Connectivity Check (fail-fast)
        run: |
          echo "::group::TCP port check ($SSH_HOST:$SSH_PORT)"
          timeout 10 bash -c "cat < /dev/null > /dev/tcp/$SSH_HOST/$SSH_PORT" \
            && echo "Port $SSH_PORT OPEN" \
            || { echo "Port $SSH_PORT CLOSED/TIMEOUT — kemungkinan firewall block GitHub Actions"; exit 1; }
          echo "::endgroup::"
          echo "::group::SSH handshake test"
          ssh -vvv \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -o BatchMode=yes \
            -p $SSH_PORT \
            $SSH_USER@$SSH_HOST "echo SSH_OK" 2>&1 | tail -50
          echo "::endgroup::"

      - name: Deploy via Rsync
        run: |
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -p $SSH_PORT" \
            --exclude='.git' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='storage/app/public/' \
            --exclude='storage/logs/' \
            --exclude='storage/debugbar/' \
            --exclude='tests/' \
            --exclude='phpunit.xml' \
            --exclude='README.md' \
            --exclude='.editorconfig' \
            --exclude='.gitattributes' \
            --exclude='.gitignore' \
            --exclude='.npmrc' \
            --exclude='package-lock.json' \
            --exclude='postcss.config.js' \
            --exclude='tailwind.config.js' \
            --exclude='vite.config.js' \
            --exclude='jsconfig.json' \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH"

      - name: Post-deploy Commands
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ env.SSH_PORT }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            php artisan optimize:clear
            php artisan storage:link --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
